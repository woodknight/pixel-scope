name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            cpack_generator: TGZ
            artifact_suffix: linux-x86_64
            package_extension: tar.gz
          - name: macOS
            os: macos-latest
            cpack_generator: ZIP
            artifact_suffix: macos-x86_64
            package_extension: zip
          - name: Windows
            os: windows-latest
            cpack_generator: ZIP
            artifact_suffix: windows-x86_64
            package_extension: zip

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            pkg-config \
            libasound2-dev \
            libtiff-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libdrm-dev \
            libgbm-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdecor-0-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: brew install libtiff

      - name: Set up vcpkg
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: afeb285c9e2e015292985856b9382ea1d82a4492
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Configure
        shell: bash
        run: |
          extra_args=()
          if [ "$RUNNER_OS" = "Windows" ]; then
            vcpkg_root="${VCPKG_ROOT:-$VCPKG_INSTALLATION_ROOT}"
            extra_args+=("-DCMAKE_TOOLCHAIN_FILE=${vcpkg_root}/scripts/buildsystems/vcpkg.cmake")
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release "${extra_args[@]}"

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Test
        shell: bash
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Install staging tree
        shell: bash
        run: cmake --install build --config Release --prefix install

      - name: Package
        working-directory: build
        shell: bash
        run: cpack -G "${{ matrix.cpack_generator }}" -C Release

      - name: Normalize package filename
        shell: bash
        run: |
          mkdir -p dist
          package_path="$(find build -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' \) | head -n 1)"
          if [[ -z "${package_path}" ]]; then
            echo "No package produced by CPack" >&2
            exit 1
          fi
          cp "${package_path}" \
            "dist/pixelscope-${{ steps.version.outputs.value }}-${{ matrix.artifact_suffix }}.${{ matrix.package_extension }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelscope-${{ steps.version.outputs.value }}-${{ matrix.artifact_suffix }}
          path: dist/pixelscope-${{ steps.version.outputs.value }}-${{ matrix.artifact_suffix }}.${{ matrix.package_extension }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pixelscope-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
