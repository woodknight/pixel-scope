name: Release

on:
  workflow_dispatch:
  push:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve artifact suffix
        id: artifact
        shell: bash
        run: |
          arch="$(uname -m)"
          case "${arch}" in
            x86_64|amd64)
              arch="x86_64"
              ;;
            aarch64|arm64)
              arch="arm64"
              ;;
          esac

          case "${RUNNER_OS}" in
            Linux)
              platform="linux"
              ;;
            macOS)
              platform="macos"
              ;;
            Windows)
              platform="windows"
              ;;
          esac

          echo "value=${platform}-${arch}" >> "$GITHUB_OUTPUT"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            pkg-config \
            libasound2-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libdrm-dev \
            libgbm-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdecor-0-dev \
            zsync

      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Test
        shell: bash
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Install staging tree
        shell: bash
        run: cmake --install build --config Release --prefix "$PWD/install"

      - name: Package archive
        shell: bash
        run: |
          mkdir -p packages
          if [ "$RUNNER_OS" = "Linux" ]; then
            cpack --config build/CPackConfig.cmake -G TGZ -C Release -B packages
          elif [ "$RUNNER_OS" = "macOS" ]; then
            cpack --config build/CPackConfig.cmake -G ZIP -C Release -B packages
          else
            cpack --config build/CPackConfig.cmake -G ZIP -C Release -B packages
            cpack --config build/CPackConfig.cmake -G NSIS -C Release -B packages
          fi

      - name: Build AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist AppDir/usr
          cmake --install build --prefix "$PWD/AppDir/usr"
          mkdir -p AppDir/usr/lib
          cp -a build/_deps/sdl2-build/libSDL2-2.0.so* AppDir/usr/lib/
          install -Dm755 packaging/linux/AppRun AppDir/AppRun
          install -Dm644 packaging/linux/pixelscope.desktop AppDir/usr/share/applications/pixelscope.desktop
          install -Dm644 assets/icon/icon_256x256.png AppDir/usr/share/icons/hicolor/256x256/apps/pixelscope.png
          install -Dm644 assets/icon/icon_256x256.png AppDir/pixelscope.png
          curl -L https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -o linuxdeploy.AppImage
          chmod +x linuxdeploy.AppImage
          export LD_LIBRARY_PATH="$PWD/build/_deps/sdl2-build${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          VERSION="${{ steps.version.outputs.value }}" \
            OUTPUT="dist/pixelscope-${{ steps.version.outputs.value }}-${{ steps.artifact.outputs.value }}.AppImage" \
            ./linuxdeploy.AppImage --appimage-extract-and-run \
              --appdir AppDir \
              --desktop-file packaging/linux/pixelscope.desktop \
              --icon-file assets/icon/icon_256x256.png \
              --executable AppDir/usr/bin/pixelscope \
              --output appimage

      - name: Normalize packaged filenames
        shell: bash
        run: |
          mkdir -p dist
          while IFS= read -r -d '' package_path; do
            base="$(basename "${package_path}")"
            case "${base}" in
              *.tar.gz)
                cp "${package_path}" "dist/pixelscope-${{ steps.version.outputs.value }}-${{ steps.artifact.outputs.value }}.tar.gz"
                ;;
              *.zip)
                cp "${package_path}" "dist/pixelscope-${{ steps.version.outputs.value }}-${{ steps.artifact.outputs.value }}.zip"
                ;;
              *.exe)
                cp "${package_path}" "dist/pixelscope-${{ steps.version.outputs.value }}-${{ steps.artifact.outputs.value }}-setup.exe"
                ;;
            esac
          done < <(find packages -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.exe' \) -print0)

      - name: Verify packaged archive contents
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tarfile
          import zipfile

          runner_os = os.environ["RUNNER_OS"]
          dist_dir = pathlib.Path("dist")

          if runner_os == "Linux":
              archive_path = next(dist_dir.glob("*.tar.gz"))
              with tarfile.open(archive_path, "r:gz") as archive:
                  names = archive.getnames()
              required_patterns = [
                  "/bin/pixelscope",
                  "/bin/rawloader_bridge",
                  "/bin/metadata_bridge",
                  "/lib/libsdl2",
              ]
          else:
              archive_path = next(dist_dir.glob("*.zip"))
              with zipfile.ZipFile(archive_path) as archive:
                  names = archive.namelist()

              if runner_os == "macOS":
                  required_patterns = [
                      "/bin/pixelscope",
                      "/bin/rawloader_bridge",
                      "/bin/metadata_bridge",
                      "/frameworks/libsdl2",
                  ]
              else:
                  required_patterns = [
                      "/bin/pixelscope.exe",
                      "/bin/rawloader_bridge.exe",
                      "/bin/metadata_bridge.exe",
                      "/bin/sdl2.dll",
                      "/bin/vcruntime",
                      "/bin/msvcp",
                  ]

          missing = []
          lower_names = [name.lower() for name in names]
          for pattern in required_patterns:
              if not any(pattern in name for name in lower_names):
                  missing.append(pattern)

          if missing:
              raise SystemExit(
                  f"{runner_os} package is missing required runtime files: "
                  + ", ".join(missing)
              )
          PY

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shopt -s nullglob
          files=(*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No packaged files found in dist/" >&2
            exit 1
          fi
          python - "${{ steps.artifact.outputs.value }}" "${files[@]}" <<'PY'
          import hashlib
          import pathlib
          import sys

          artifact = sys.argv[1]
          paths = [pathlib.Path(arg) for arg in sys.argv[2:]]
          output = pathlib.Path(f"SHA256SUMS-{artifact}.txt")

          with output.open("w", encoding="utf-8") as handle:
              for path in paths:
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  handle.write(f"{digest}  {path.name}\n")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelscope-${{ steps.version.outputs.value }}-${{ steps.artifact.outputs.value }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pixelscope-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
